<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Contato</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/menu.js"></script>
</head>
<body class="pagina-contato-limpa">
    <header>
        <div class="titulo">
            <h1>Portfólio</h1>
        </div>
        <nav>
            <a class="btn-menu" href="index.html">Home</a>  
            <a class="btn-menu" href="about.html">Sobre</a>
            <a class="btn-menu" href="portifolio.html">Portfólio</a>
            <a class="btn-menu" href="services.html">Serviços</a>
            <a class="btn-menu" href="contato.html">Contato</a> 
        </nav>
    </header>

    <main class="main-contato">
        <section class="container-contato">
            <div class="contato">
                <h2 class="contato-titulo">Contact <span>Me!</span></h2>
        
                <form action="#" class="contato-form">
                    <div class="contato-row">
                        <input type="text" placeholder="Full Name">
                        <input type="email" placeholder="Email Address">
                    </div>
        
                    <div class="contato-row">
                        <input type="tel" placeholder="Mobile Number">
                        <input type="text" placeholder="Email Subject">
                    </div>
        
                    <textarea placeholder="Your Message" rows="8"></textarea>
        
                    <div class="contato-btn-box">
                        <button type="submit" class="contato-btn">Send Message</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="contato-redes">
            <a href="#"><img src="icons/github.png" alt="Github" width="60px"></a>
            <a href="#"><img src="icons/instagram (1).png" alt="Instagram" width="60px"></a>
            <a href="#"><img src="icons/whatsapp.png" alt="Whatsapp" width="60px"></a>
        </div>
    </footer>
</body>
</html>
